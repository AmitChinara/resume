<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amit Chinara Resume</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/style.css?v=3.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>
<body>
    <div class="container">
        <!-- Profile Section -->
        <section class="profile">
            <h1 id="name"></h1>
            <div class="contact-info">
                <span id="mail-id">✉<a id="email"></a></span>
                <span id="phone-number">📱<a id="phone"></a></span>
                <span id="linkedin"><i class="fa-brands fa-linkedin"></i> <a id="linkedin-link"></a></span>
                <span id="leetcode"><img src="https://leetcode.com/static/images/LeetCode_logo_rvs.png" alt="LeetCode" height="18" style="vertical-align:middle; background-color: black; border-radius: 3px;"></i> <a id="leetcode-link"></a></span>
            </div>
        </section>

        <!-- Main content -->
        <div class="main-content">
            <!-- Left Column -->
            <aside class="left-column">
                <section class="prof-summary">
                    <h2>Professional Summary</h2>
                    <div id="about"></div>
                </section>
                
                <section class="skills">
                    <h2>Skills</h2>
                    <div id="skills"></div>
                </section>
            </aside>

            <!-- Right Column -->
            <section class="right-column">
                <section class="work-history">
                    <h2>Work History</h2>
                    <div id="work-history"></div>
                </section>
                <section class="education">
                    <h2>Education</h2>
                    <div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Course</th>
                                    <th>Institution</th>
                                    <th>Date</th>
                                    <th>Marks</th>
                                </tr>
                            </thead>
                            <tbody id="education"></tbody>
                        </table>
                    </div>
                </section>
            </section>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2025 Amit Chinara. All Rights Reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="./Script/staticFunction.js?v=1.0"></script>
    <script src="./Script/data.js?v=1.0"></script>
    <script src="./Script/scripts.js?v=1.0"></script>
</body>
</html>
